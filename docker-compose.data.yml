# Overpass API + Nominatim for building golf course data (full planet).
#
# Usage (prod):
#   docker compose -f docker-compose.data.yml up
#
# Usage (dev, Scotland only):
#   docker compose -f docker-compose.data.yml -f docker-compose.data.dev.yml up
#
# Once ready:
#   OVERPASS_URL=http://localhost:12346/api/interpreter \
#   NOMINATIM_URL=http://localhost:8080 \
#   node scripts/build-data.js

services:
  # Downloads PBF if not already present, then serves it over HTTP.
  pbf-download:
    image: alpine
    command: sh -c "[ -f /pbf/planet-latest.osm.pbf ] || (wget -O /pbf/planet-latest.osm.pbf.tmp https://planet.openstreetmap.org/pbf/planet-latest.osm.pbf && mv /pbf/planet-latest.osm.pbf.tmp /pbf/planet-latest.osm.pbf)"
    volumes:
      - ./data/pbf:/pbf

  pbf-server:
    image: nginx:alpine
    volumes:
      - ./data/pbf:/usr/share/nginx/html:ro
    depends_on:
      pbf-download:
        condition: service_completed_successfully
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://127.0.0.1/ > /dev/null"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 30s

  overpass:
    image: wiktorn/overpass-api
    platform: linux/amd64
    ports:
      - "12346:80"
    environment:
      OVERPASS_META: "no"
      OVERPASS_MODE: "init"
      OVERPASS_PLANET_URL: "http://pbf-server/planet-latest.osm.pbf"
      OVERPASS_RULES_LOAD: "10"
    volumes:
      - overpass-db:/db
    depends_on:
      pbf-server:
        condition: service_healthy

  nominatim:
    image: mediagis/nominatim:4.4
    ports:
      - "8080:8080"
    environment:
      PBF_URL: "http://pbf-server/planet-latest.osm.pbf"
      NOMINATIM_PASSWORD: "nominatim"
    volumes:
      - nominatim-db:/var/lib/postgresql/16/main
    shm_size: 1g
    depends_on:
      pbf-server:
        condition: service_healthy

volumes:
  overpass-db:
  nominatim-db:
