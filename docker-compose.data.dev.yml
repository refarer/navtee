# Dev override: uses Scotland extract instead of full planet.
#
# Usage:
#   docker compose -f docker-compose.data.yml -f docker-compose.data.dev.yml up

services:
  pbf-server:
    image: python:3-slim
    command: bash -c "[ -f /pbf/scotland-latest.osm.bz2 ] || (apt-get update -qq && apt-get install -y -qq --no-install-recommends osmium-tool && osmium cat -o /pbf/scotland-latest.osm.bz2 /pbf/scotland-latest.osm.pbf) && python -m http.server 80 --directory /pbf"
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import socket; s=socket.socket(); s.connect(('127.0.0.1',80)); s.close()\""]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15m

  overpass:
    environment:
      OVERPASS_PLANET_URL: "http://pbf-server/scotland-latest.osm.bz2"

  nominatim:
    environment:
      PBF_URL: "http://pbf-server/scotland-latest.osm.pbf"
